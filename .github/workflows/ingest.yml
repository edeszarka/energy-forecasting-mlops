# Hourly Data Ingestion Workflow
#
# ARCHITECTURE NOTE:
# This workflow implements the "Split Ingestion" pattern required for Databricks Free Edition.
# Because the Databricks Free Edition environment blocks outbound internet access, 
# Databricks notebooks cannot call external APIs (ENTSO-E, OpenMeteo) directly.
# 
# Responsibility Split:
# 1. GitHub Actions (This Workflow): Fetches data from APIs, slices it into hourly JSONs, 
#    and uploads them to a Databricks Unity Catalog Volume.
# 2. Databricks Notebook (01_ingest): Triggered by this workflow. It reads the files 
#    from the Volume and merges them into Delta Lake.

name: "Hourly Data Ingestion"

on:
  schedule:
    - cron: "5 * * * *"   # Runs at :05 past every hour
  workflow_dispatch:
    inputs:
      run_date:
        description: "ISO datetime to fetch (e.g. 2024-03-15T14:00:00). Empty = current UTC hour."
        required: false
        default: ""
      lookback_hours:
        description: "How many hours back to fetch (for backfill)"
        required: false
        default: "2"

concurrency:
  group: ingestion-pipeline
  cancel-in-progress: false # Queue runs to ensure no data gaps during backfills

env:
  PYTHON_VERSION: "3.11"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Note: CLI uses dbfs:/Volumes syntax for Unity Catalog Volumes
  VOLUME_BASE: "dbfs:/Volumes/workspace/energy_forecasting/raw_ingestion"

jobs:
  fetch_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-databricks-cli/main/install.sh | sh

      - name: Resolve run parameters
        shell: bash
        run: |
          if [ -z "${{ github.event.inputs.run_date }}" ]; then
            RUN_DATE=$(python -c "from datetime import datetime, timezone; print(datetime.now(timezone.utc).replace(minute=0, second=0, microsecond=0).isoformat())")
          else
            RUN_DATE="${{ github.event.inputs.run_date }}"
          fi
          
          LOOKBACK_HOURS="${{ github.event.inputs.lookback_hours || '2' }}"
          
          echo "RUN_DATE=$RUN_DATE" >> $GITHUB_ENV
          echo "LOOKBACK_HOURS=$LOOKBACK_HOURS" >> $GITHUB_ENV
          echo "Resolved RUN_DATE=$RUN_DATE, LOOKBACK_HOURS=$LOOKBACK_HOURS"

      - name: Fetch and segment data
        shell: bash
        env:
          ENTSO_E_API_KEY: ${{ secrets.ENTSO_E_API_KEY }}
          PYTHONPATH: "."
        run: |
          python3 - <<EOF
          import os
          import sys
          import json
          from datetime import datetime, timedelta, timezone
          from pathlib import Path
          import pandas as pd
          from src.api_client import EntsoEClient, OpenMeteoClient
          from src.config import ENTSO_E_MAX_RANGE_DAYS

          try:
              run_dt = datetime.fromisoformat(os.environ["RUN_DATE"]).replace(tzinfo=timezone.utc)
              lookback = int(os.environ["LOOKBACK_HOURS"])
              fetch_start = run_dt - timedelta(hours=lookback)
              fetch_end = run_dt

              # Create local directories
              Path("/tmp/load").mkdir(parents=True, exist_ok=True)
              Path("/tmp/temperature").mkdir(parents=True, exist_ok=True)

              print(f"Fetching window: {fetch_start} to {fetch_end}")

              # 1. Fetch Load Data
              load_df = pd.DataFrame()
              load_status = "ok"
              load_error = ""
              try:
                  client = EntsoEClient()
                  load_df = client.fetch_actual_load(fetch_start, fetch_end)
              except Exception as e:
                  print(f"ENTSO-E fetch failed: {e}")
                  load_status = "fetch_failed"
                  load_error = str(e)

              # 2. Fetch Temperature Data
              temp_df = pd.DataFrame()
              temp_status = "ok"
              temp_error = ""
              try:
                  temp_client = OpenMeteoClient()
                  temp_df = temp_client.fetch_temperature(fetch_start.date(), fetch_end.date())
                  temp_df = temp_client._fallback_temperature(temp_df)
              except Exception as e:
                  print(f"OpenMeteo fetch failed: {e}")
                  temp_status = "fetch_failed"
                  temp_error = str(e)

              # 3. Segment and Save hourly files
              file_count = 0
              current_h = fetch_start
              while current_h < fetch_end:
                  h_start = current_h
                  h_end = current_h + timedelta(hours=1)
                  filename = h_start.strftime("%Y-%m-%dT%H-00-00Z.json")
                  
                  # Load slice
                  if load_status == "ok" and not load_df.empty:
                      h_load = load_df[(load_df['timestamp'] >= h_start) & (load_df['timestamp'] < h_end)].copy()
                      if not h_load.empty:
                          h_load["timestamp"] = h_load["timestamp"].dt.strftime("%Y-%m-%dT%H:%M:%S+00:00")
                          h_load["fetched_at"] = h_load["fetched_at"].dt.strftime("%Y-%m-%dT%H:%M:%S+00:00")
                          h_load.to_json(f"/tmp/load/{filename}", orient="records")
                      else:
                          with open(f"/tmp/load/{filename}", "w") as f: json.dump([], f)
                  else:
                      with open(f"/tmp/load/{filename}", "w") as f:
                          json.dump({"status": load_status, "error": load_error, "data": []}, f)

                  # Temperature slice
                  if temp_status == "ok" and not temp_df.empty:
                      h_temp = temp_df[(temp_df['timestamp'] >= h_start) & (temp_df['timestamp'] < h_end)].copy()
                      if not h_temp.empty:
                          h_temp["timestamp"] = h_temp["timestamp"].dt.strftime("%Y-%m-%dT%H:%M:%S+00:00")
                          h_temp["fetched_at"] = h_temp["fetched_at"].dt.strftime("%Y-%m-%dT%H:%M:%S+00:00")
                          h_temp.to_json(f"/tmp/temperature/{filename}", orient="records")
                      else:
                          with open(f"/tmp/temperature/{filename}", "w") as f: json.dump([], f)
                  else:
                      with open(f"/tmp/temperature/{filename}", "w") as f:
                          json.dump({"status": temp_status, "error": temp_error, "data": []}, f)
                  
                  current_h = h_end
                  file_count += 1

              print(f"Load rows fetched: {len(load_df)}")
              print(f"Temperature rows fetched: {len(temp_df)}")
              print(f"Files written: {file_count}")

          except Exception as fatal:
              print(f"CRITICAL ERROR in Python script: {fatal}")
              sys.exit(1)
          EOF

      - name: Ensure Volume directories exist
        shell: bash
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks fs mkdirs "${{ env.VOLUME_BASE }}/load"
          databricks fs mkdirs "${{ env.VOLUME_BASE }}/temperature"
          databricks fs mkdirs "${{ env.VOLUME_BASE }}/archive/load"
          databricks fs mkdirs "${{ env.VOLUME_BASE }}/archive/temperature"

      - name: Upload JSON files to Databricks
        shell: bash
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          for f in /tmp/load/*.json; do
            [ -e "$f" ] || continue
            filename=$(basename "$f")
            databricks fs cp "$f" "${{ env.VOLUME_BASE }}/load/$filename" --overwrite
            echo "Uploaded load: $filename"
          done
          
          for f in /tmp/temperature/*.json; do
            [ -e "$f" ] || continue
            filename=$(basename "$f")
            databricks fs cp "$f" "${{ env.VOLUME_BASE }}/temperature/$filename" --overwrite
            echo "Uploaded temp: $filename"
          done

      - name: Trigger Databricks Workflow
        shell: bash
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          JOB_ID=$(databricks jobs list --output json | \
            python3 -c "import json, sys; jobs = json.load(sys.stdin).get('jobs', []); match = [j for j in jobs if j['settings']['name'] == 'energy_hourly_pipeline']; print(match[0]['job_id'] if match else '')")
          
          if [ -z "$JOB_ID" ]; then
            echo "::warning::Job 'energy_hourly_pipeline' not found - skipping trigger. Deploy the bundle first."
            exit 0
          fi
          
          RUN_RESPONSE=$(databricks jobs run-now --job-id "$JOB_ID" --job-parameters "{\"run_date\": \"$RUN_DATE\", \"dry_run\": \"false\"}")
          RUN_ID=$(echo "$RUN_RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin)['run_id'])")
          
          echo "Triggered job run: $RUN_ID"
          echo "DATABRICKS_RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Write job summary
        shell: bash
        run: |
          echo "## Ingestion Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Run date | $RUN_DATE |" >> $GITHUB_STEP_SUMMARY
          echo "| Lookback hours | $LOOKBACK_HOURS |" >> $GITHUB_STEP_SUMMARY
          echo "| Databricks run ID | ${DATABRICKS_RUN_ID:-not triggered} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Files uploaded & Pipeline triggered |" >> $GITHUB_STEP_SUMMARY
